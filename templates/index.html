<!DOCTYPE html>
<html>
<head>
    <title>Destan 9591</title>

    <style>
        body {
            margin: 0;
            height: 100vh;
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            font-family: Arial;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* MENÜ */
        .menu {
            position: absolute;
            top: 20px;
            left: 20px;
            font-size: 30px;
            color: white;
            cursor: pointer;
        }

        .menu-box {
            position: absolute;
            top: 60px;
            left: 20px;
            background: rgba(0,0,0,0.8);
            padding: 15px;
            border-radius: 10px;
            display: none;
        }

        .menu-box a {
            color: white;
            text-decoration: none;
            display: block;
            margin: 5px 0;
        }

        /* ANA KART */
        .card {
            backdrop-filter: blur(15px);
            background: rgba(255,255,255,0.1);
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            color: white;
            box-shadow: 0 0 40px rgba(0,0,0,0.6);
        }

        /* LOGO */
        .logo {
            width: 200px;
            animation: glow 2s infinite alternate;
        }

        @keyframes glow {
            from { filter: drop-shadow(0 0 10px #00c6ff); }
            to { filter: drop-shadow(0 0 25px #00c6ff); }
        }

        h1 {
            margin-top: 10px;
            font-size: 30px;
            letter-spacing: 2px;
        }

        input, select {
            width: 250px;
            padding: 10px;
            margin: 10px;
            border-radius: 10px;
            border: none;
            outline: none;
        }

        button {
            padding: 10px 25px;
            border-radius: 10px;
            border: none;
            background: #00c6ff;
            color: white;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #0072ff;
            transform: scale(1.05);
        }
    </style>
</head>

<body>

<!-- MENÜ -->
<div class="menu" onclick="toggleMenu()">☰</div>

<div class="menu-box" id="menuBox">
    <a href="/panel">Sponsor Listesi</a>
</div>

<div class="card">

    <img src="{{ url_for('static', filename='logo.png') }}" class="logo">

    <h1>DESTAN-9591</h1>

    <form method="POST">
        <input type="text" name="marka" placeholder="Marka adı"><br>

        <select name="tur">
            <option value="">Seçiniz</option>
            <option value="promosyon">🎁 Promosyon</option>
            <option value="maddi">💰 Maddi</option>
            <option value="malzeme">🔧 Malzeme</option>
        </select><br>

        <button>Devam</button>
    </form>

</div>

<script>
function toggleMenu() {
    var menu = document.getElementById("menuBox");
    if (menu.style.display === "block") {
        menu.style.display = "none";
    } else {
        menu.style.display = "block";
    }
}
</script>

</body>
</html>
