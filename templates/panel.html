<!DOCTYPE html>
<html>
<head>
    <title>Panel</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: linear-gradient(135deg, #141e30, #243b55);
            color: white;
            text-align: center;
        }

        h1 {
            margin-top: 30px;
        }

        .container {
            display: flex;
            justify-content: space-around;
            margin-top: 50px;
        }

        .box {
            width: 250px;
            padding: 20px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
            background: rgba(255,255,255,0.1);
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            transition: 0.3s;
        }

        .box:hover {
            transform: scale(1.05);
        }

        ul {
            list-style: none;
            padding: 0;
        }

        li {
            background: rgba(255,255,255,0.2);
            margin: 5px;
            padding: 5px;
            border-radius: 10px;
        }
    </style>
</head>

<body>

<h1>🔥 Sponsor Paneli</h1>

<div class="container">

    <div class="box">
        <h2>🎁 Promosyon</h2>
        <ul>
        {% for m in veriler.promosyon %}
            <li>{{ m }}</li>
        {% endfor %}
        </ul>
    </div>

    <div class="box">
        <h2>💰 Maddi</h2>
        <ul>
        {% for m in veriler.maddi %}
            <li>{{ m }}</li>
        {% endfor %}
        </ul>
    </div>

    <div class="box">
        <h2>🔧 Malzeme</h2>
        <ul>
        {% for m in veriler.malzeme %}
            <li>{{ m }}</li>
        {% endfor %}
        </ul>
    </div>

</div>

</body>
</html>
